<style>
  :root {

    --accent2: #7c5cfc;
    --accent3: #1fd8a4;
    --text: #e8eaf0;
    --text2: #8b90a0;
    --text3: #555b6e;
    --pill-bg: #1e2333;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 28px 40px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 16px;
    background: var(--surface);
  }

  header h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  header span {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent3);
    background: rgba(31,216,164,0.1);
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid rgba(31,216,164,0.2);
    letter-spacing: 0.5px;

  .layout {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  aside {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px 0;
  }

  .aside-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 0 20px 12px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    position: relative;
  }

  .nav-item:hover {
    background: var(--surface2);
    border-left-color: var(--text3);
  }

  .nav-item.active {
    background: var(--surface2);
    border-left-color: var(--accent);
  }

  .nav-item.active .nav-num {
    background: var(--accent);
    color: #fff;
  }

  .nav-num {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    background: var(--pill-bg);
    color: var(--text2);
    width: 24px;
    height: 24px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .nav-info { flex: 1; min-width: 0; }

  .nav-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }

  .nav-cu {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    margin-top: 1px;
  }

  .nav-item.active .nav-title { color: var(--accent); }

  .main {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px;
  }

  .panel { display: none; animation: fadeIn 0.2s ease; }
  .panel.active { display: block; }

  @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }

  .panel-header {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 28px;
  }

  .panel-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .panel-meta { flex: 1; }

  .panel-title {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.3px;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .panel-desc {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.6;
  }

  .tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
  }

  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    color: var(--text2);
    background: var(--pill-bg);
  }

  .diagram-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    overflow-x: auto;
  }

  .diagram-card .mermaid {
    display: flex;
    justify-content: center;
  }

  .diagram-card svg {
    max-width: 100%;
    height: auto;
  }

  .loading-msg {
    text-align: center;
    padding: 60px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text3);
  }

  .dot {
    display: inline-block;
    animation: blink 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  .mermaid svg {
    background: transparent !important;
  }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }
</style>
</head>

// Build nav
const nav = document.getElementById('nav');
const main = document.getElementById('main');

modules.forEach((m, i) => {
  const item = document.createElement('div');
  item.className = 'nav-item' + (i === 0 ? ' active' : '');
  item.dataset.index = i;
  item.innerHTML = `
    <div class="nav-num">${m.id}</div>
    <div class="nav-info">
      <div class="nav-title">${m.title}</div>
      <div class="nav-cu">${m.cu}</div>
    </div>`;
  item.addEventListener('click', () => switchPanel(i));
  nav.appendChild(item);

  const panel = document.createElement('div');
  panel.className = 'panel' + (i === 0 ? ' active' : '');
  panel.id = 'panel-' + i;
  panel.innerHTML = `
    <div class="panel-header">
      <div class="panel-icon" style="background:${m.iconBg}">${m.icon}</div>
      <div class="panel-meta">
        <div class="panel-title">${m.title}</div>
        <div class="panel-desc">${m.desc}</div>
        <div class="tags">${m.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>
    </div>
    <div class="diagram-card">
      <div class="loading-msg">Generando diagrama<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
      <div class="mermaid" id="mermaid-${i}" style="display:none"></div>
    </div>`;
  main.appendChild(panel);
});

function switchPanel(idx) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
  document.querySelector(`.nav-item[data-index="${idx}"]`).classList.add('active');
  document.getElementById('panel-' + idx).classList.add('active');
  renderDiagram(idx);
}

const rendered = new Set();

async function renderDiagram(idx) {
  if (rendered.has(idx)) return;
  rendered.add(idx);
  const m = modules[idx];
  const container = document.getElementById('mermaid-' + idx);
  const loading = container.parentElement.querySelector('.loading-msg');
  try {
    const { svg } = await mermaid.render('diag-' + idx, 'classDiagram\n' + m.diagram.replace('classDiagram\n',''));
    container.innerHTML = svg;
    container.style.display = 'flex';
    if (loading) loading.style.display = 'none';
  } catch(e) {
    if (loading) loading.textContent = 'Error al renderizar el diagrama.';
    console.error(e);
  }
}

mermaid.initialize({
  startOnLoad: false,
  theme: 'dark',
  themeVariables: {
    darkMode: true,
    background: '#13161d',
    primaryColor: '#1a1e28',
    primaryBorderColor: '#3a4058',
    primaryTextColor: '#e8eaf0',
    secondaryColor: '#1a2230',
    tertiaryColor: '#1e1a2e',
    lineColor: '#4f6080',
    textColor: '#c0c4d0',
    fontSize: '13px',
    fontFamily: '"DM Mono", monospace',
    classText: '#e8eaf0',
    fillType0: '#1a2030',
    attributeBackgroundColorEven: '#161920',
    attributeBackgroundColorOdd: '#1a1e28',
    nodeBorder: '#3a4058',
  }
});

// Render first panel
renderDiagram(0);
</script>
